<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jolene - Verifying</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #FDF2F8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 24px; padding: 40px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 10px 40px rgba(236,72,153,0.15); }
    .logo { font-family: 'Brush Script MT', cursive; font-size: 48px; color: #EC4899; margin-bottom: 20px; }
    .spinner { width: 50px; height: 50px; border: 4px solid #FDF2F8; border-top-color: #EC4899; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn { display: block; background: #EC4899; color: white; padding: 16px 40px; border-radius: 30px; text-decoration: none; font-weight: 600; font-size: 18px; margin: 10px auto; }
    .btn-expo { background: #14B8A6; }
    .msg { color: #374151; font-size: 16px; margin: 10px 0; }
    .sub { color: #9CA3AF; font-size: 14px; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Jolene</div>
    <div class="spinner" id="spinner"></div>
    <p class="msg" id="msg">Opening Jolene app...</p>
    <a class="btn" id="btn" style="display:none;">Open Jolene App</a>
    <a class="btn btn-expo" id="btn-expo" style="display:none;">Open in Expo Go</a>
    <p class="sub" id="sub"></p>
  </div>
  <script>
    (function() {
      var params = window.location.search;
      var hash = window.location.hash;
      var allParams = params + hash;
      
      // Native app link
      var nativeLink = 'jolene://auth/callback' + allParams;
      // Expo Go link
      var expoLink = 'exp://local-fashion-nz.ngrok.io/--/auth/callback' + allParams;
      
      document.getElementById('btn').href = nativeLink;
      document.getElementById('btn-expo').href = expoLink;
      
      // Try native first
      window.location.href = nativeLink;
      
      // Show buttons after 1.5 seconds
      setTimeout(function() {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').textContent = 'Tap to open the app';
        document.getElementById('btn').style.display = 'block';
        document.getElementById('btn-expo').style.display = 'block';
        document.getElementById('sub').textContent = 'Use "Open in Expo Go" for testing';
      }, 1500);
    })();
  </script>
</body>
</html>
