<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jolene - Verifying</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #FDF2F8 0%, #FCE7F3 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 24px; padding: 40px; max-width: 340px; text-align: center; box-shadow: 0 10px 40px rgba(236,72,153,0.15); }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; color: #1F2937; margin-bottom: 8px; }
    p { color: #6B7280; font-size: 16px; margin-bottom: 24px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #FDF2F8; border-top-color: #EC4899; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn { display: inline-block; background: #EC4899; color: white; padding: 14px 32px; border-radius: 12px; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">👗</div>
    <h1>Welcome to Jolene!</h1>
    <p id="msg">Verifying your email...</p>
    <div class="spinner" id="spinner"></div>
    <a class="btn" id="btn" style="display:none;" href="#">Open Jolene</a>
  </div>
  <script>
    (function() {
      var params = window.location.search || '';
      if (window.location.hash) {
        params = params ? params + '&' + window.location.hash.substring(1) : '?' + window.location.hash.substring(1);
      }
      
      var deepLink = 'jolene://auth/callback' + params;
      var expoLink = 'exp://local-fashion-nz.ngrok.io/--/auth/callback' + params;
      
      document.getElementById('btn').href = deepLink;
      
      // Try native app first
      window.location.href = deepLink;
      
      // Fallback after 2 seconds
      setTimeout(function() {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('msg').textContent = 'Tap to open the app';
        document.getElementById('btn').style.display = 'inline-block';
      }, 2000);
    })();
  </script>
</body>
</html>
