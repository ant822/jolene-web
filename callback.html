<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jolene - Opening App...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #FDF2F8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 24px; padding: 40px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 10px 40px rgba(236,72,153,0.15); }
    .logo { font-family: 'Brush Script MT', cursive; font-size: 48px; color: #EC4899; margin-bottom: 10px; }
    .spinner { width: 50px; height: 50px; border: 4px solid #FDF2F8; border-top-color: #EC4899; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title { font-size: 22px; font-weight: 600; margin-bottom: 10px; color: #374151; }
    .msg { color: #6B7280; font-size: 16px; margin-bottom: 25px; line-height: 1.5; }
    .btn { display: block; background: #EC4899; color: white; padding: 16px 40px; border-radius: 30px; text-decoration: none; font-weight: 600; font-size: 18px; margin: 10px auto; }
    .btn-expo { background: #14B8A6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Jolene</div>
    <div class="spinner"></div>
    <div class="title">Opening Jolene...</div>
    <p class="msg">If the app doesn't open automatically, tap below:</p>
    <a class="btn" id="prodBtn">Open Jolene App</a>
    <a class="btn btn-expo" id="expoBtn">Open in Expo Go</a>
  </div>
  
  <script>
    (function() {
      var hash = window.location.hash;
      var search = window.location.search;
      var tokens = hash || search;
      
      // Build deep links with tokens
      var prodLink = 'jolene://auth/callback' + search + hash;
      var expoLink = 'exp://local-fashion-nz.ngrok.io/--/auth/callback' + tokens;
      
      document.getElementById('prodBtn').href = prodLink;
      document.getElementById('expoBtn').href = expoLink;
      
      // Auto-open Expo Go with tokens
      window.location.href = expoLink;
    })();
  </script>
</body>
</html>
