<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jolene - Email Verified!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #FDF2F8 0%, #FCE7F3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { text-align: center; max-width: 400px; }
        .logo { font-family: 'Brush Script MT', cursive; font-size: 56px; color: #EC4899; margin-bottom: 30px; }
        .emoji { font-size: 64px; margin-bottom: 20px; }
        .message { font-size: 22px; color: #374151; margin-bottom: 10px; font-weight: 600; }
        .submessage { font-size: 16px; color: #6B7280; margin-bottom: 30px; }
        .button {
            display: inline-block;
            background: #EC4899;
            color: white;
            padding: 16px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
        }
        .secondary-text { font-size: 14px; color: #9CA3AF; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Jolene</div>
        <div class="emoji">✅</div>
        <p class="message">Email Verified!</p>
        <p class="submessage">Tap the button below to open the app and log in</p>
        <a id="openAppBtn" href="jolene://auth/callback" class="button">Open Jolene App</a>
        <p class="secondary-text">If the app doesn't open, make sure Jolene is installed</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const hash = window.location.hash;
        let appUrl = 'jolene://auth/callback';
        if (params.toString()) appUrl += '?' + params.toString();
        if (hash) appUrl += hash;
        document.getElementById('openAppBtn').href = appUrl;
        setTimeout(() => { window.location.href = appUrl; }, 500);
    </script>
</body>
</html>
