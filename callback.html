<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jolene - Email Verification</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: -apple-system, sans-serif; background: #FDF2F8; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px;">
  <div style="background: white; border-radius: 24px; padding: 40px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 10px 40px rgba(236,72,153,0.15);">
    <div style="font-family: 'Brush Script MT', cursive; font-size: 48px; color: #EC4899;">Jolene</div>
    
    <div id="loading">
      <div style="width: 50px; height: 50px; border: 4px solid #FDF2F8; border-top-color: #EC4899; border-radius: 50%; animation: spin 1s linear infinite; margin: 30px auto;"></div>
      <p style="color: #374151; font-size: 18px;">Verifying your email...</p>
    </div>
    
    <div id="success" style="display: none;">
      <div style="font-size: 64px; margin: 20px 0;">✅</div>
      <h2 style="color: #10B981; margin-bottom: 10px;">Email Verified!</h2>
      <p style="color: #6B7280; margin-bottom: 30px;">Tap below to open the app</p>
      <a id="openBtn" href="#" style="display: inline-block; background: #EC4899; color: white; padding: 16px 40px; border-radius: 30px; text-decoration: none; font-weight: 600; font-size: 18px;">Open Jolene App</a>
      <p style="color: #9CA3AF; font-size: 14px; margin-top: 20px;">If app doesn't open, you can log in manually</p>
    </div>
    
    <div id="error" style="display: none;">
      <div style="font-size: 64px; margin: 20px 0;">❌</div>
      <h2 style="color: #EF4444;">Verification Failed</h2>
      <p id="errorMsg" style="color: #6B7280;">Link may be expired. Please try again.</p>
    </div>
  </div>
  
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  
  <script>
    const SUPABASE_URL = 'https://lhorbrtdlvnpwxpitcvp.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxob3JicnRkbHZucHd4cGl0Y3ZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI2ODMwNTYsImV4cCI6MjA1ODI1OTA1Nn0.LXKP_jLCvM-jL2LHLAhVOHYQbRPpvkpRhcycAUdMV9Y';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    async function verify() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      const access = params.get('access_token');
      const refresh = params.get('refresh_token');
      
      if (access && refresh) {
        const { error } = await sb.auth.setSession({ access_token: access, refresh_token: refresh });
        if (!error) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('success').style.display = 'block';
          const link = 'jolene://auth/callback#access_token=' + access + '&refresh_token=' + refresh;
          document.getElementById('openBtn').href = link;
          setTimeout(() => { window.location.href = link; }, 500);
          return;
        }
      }
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    }
    verify();
  </script>
</body>
</html>
