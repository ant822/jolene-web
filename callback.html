Now for the GitHub callback.html, what was working with build 63? Here's a simple version that passes tokens to the app:
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jolene</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #FDF2F8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 24px; padding: 40px; text-align: center; box-shadow: 0 10px 40px rgba(236,72,153,0.15); }
    .logo { font-family: 'Brush Script MT', cursive; font-size: 48px; color: #EC4899; }
    .spinner { width: 40px; height: 40px; border: 4px solid #FDF2F8; border-top-color: #EC4899; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { color: #6B7280; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Jolene</div>
    <div class="spinner"></div>
    <p class="msg">Opening app...</p>
  </div>
  <script>
    (function() {
      var hash = window.location.hash;
      var expoLink = 'exp://local-fashion-nz.ngrok.io/--/auth/callback' + hash;
      var prodLink = 'jolene://auth/callback' + hash;
      
      setTimeout(function() { window.location.href = prodLink; }, 100);
      setTimeout(function() { window.location.href = expoLink; }, 1500);
    })();
  </script>
</body>
</html>
